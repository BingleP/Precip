server {
    listen 80;
    listen [::]:80;
    server_name precip.kerrick.ca;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name precip.kerrick.ca;

    ssl_certificate     /etc/letsencrypt/live/kerrick.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kerrick.ca/privkey.pem;

    root /var/www/precip;
    index index.html;

    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
    }

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; connect-src https://api.open-meteo.com https://air-quality-api.open-meteo.com https://geocoding-api.open-meteo.com https://nominatim.openstreetmap.org; img-src 'self' https://tile.openstreetmap.org; font-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Alt-Svc "clear" always;

    location = /index.html {
        expires -1;
        try_files $uri =404;
    }

    location ~* \.(css|js)$ {
        expires 1h;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
