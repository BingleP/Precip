# Production Nginx server block for Precip.
# Replace weather.example.com and /var/www/precip with your real hostname/path.

server {
    listen 80;
    listen [::]:80;
    server_name weather.example.com;

    root /var/www/precip;
    index index.html;

    # Static public site: only read methods are needed.
    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) {
        return 405;
    }

    # Security headers for a public, account-free static app.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; connect-src https://api.open-meteo.com https://geocoding-api.open-meteo.com; img-src 'none'; font-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Enable this only after HTTPS is working for the final public domain.
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location = /index.html {
        expires -1;
        try_files $uri =404;
    }

    location ~* \.(css|js)$ {
        expires 1h;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
